name: Telegram Run Listener

on:
  schedule:
    # Every 30 min, 5h-20h UTC (= 7h-22h Valencia CEST UTC+2)
    - cron: "*/30 5-20 * * *"
  workflow_dispatch:

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      actions: write

    steps:
      - name: Check for run command and trigger poster
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, time, json
          from urllib.request import urlopen, Request
          from urllib.parse import urlencode
          from urllib.error import HTTPError

          TOKEN    = os.environ['TELEGRAM_BOT_TOKEN']
          CHAT_ID  = str(os.environ['TELEGRAM_CHAT_ID'])
          GH_TOKEN = os.environ['GITHUB_TOKEN']
          REPO     = os.environ['GITHUB_REPOSITORY']

          def tg_get(method, params=None):
              url = f"https://api.telegram.org/bot{TOKEN}/{method}"
              if params:
                  url += "?" + urlencode(params)
              with urlopen(url, timeout=10) as r:
                  return json.loads(r.read())

          def tg_post(method, payload):
              url = f"https://api.telegram.org/bot{TOKEN}/{method}"
              data = json.dumps(payload).encode()
              req = Request(url, data=data, headers={"Content-Type": "application/json"})
              with urlopen(req, timeout=10) as r:
                  return json.loads(r.read())

          def gh_get(path, params=None):
              url = f"https://api.github.com{path}"
              if params:
                  url += "?" + urlencode(params)
              req = Request(url, headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json",
              })
              with urlopen(req, timeout=10) as r:
                  return json.loads(r.read())

          def gh_post(path, payload):
              url = f"https://api.github.com{path}"
              data = json.dumps(payload).encode()
              req = Request(url, data=data, headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
              })
              try:
                  with urlopen(req, timeout=10) as r:
                      return r.status
              except HTTPError as e:
                  print(f"  HTTP {e.code}: {e.read().decode()}")
                  return e.code

          # Accept "run" messages from the last 8 minutes
          cutoff = int(time.time()) - 480
          print(f"Checking Telegram for 'run' since {cutoff} (now: {int(time.time())})")

          data = tg_get("getUpdates", {"limit": 50, "allowed_updates": "message"})
          updates = data.get("result", [])
          print(f"  {len(updates)} updates retrieved")

          found = False
          for update in updates:
              if "message" not in update:
                  continue
              msg   = update["message"]
              msg_date = msg.get("date", 0)
              msg_chat = str(msg.get("chat", {}).get("id", ""))
              msg_text = msg.get("text", "").strip().lower()
              print(f"  msg date={msg_date} chat={msg_chat} text={repr(msg_text)}")

              if msg_date < cutoff:
                  continue
              if msg_chat != CHAT_ID:
                  print(f"    ↳ chat mismatch (expected {CHAT_ID})")
                  continue
              if msg_text not in ("run", "/run"):
                  continue

              print("  ✅ 'run' command found — checking active runs...")
              found = True

              runs = gh_get(f"/repos/{REPO}/actions/runs", {"status": "in_progress"})
              active = [r for r in runs.get("workflow_runs", [])
                        if "poster" in r.get("name","").lower() or "daily" in r.get("name","").lower()]
              if active:
                  print(f"  ⚠️  Poster already running ({active[0]['name']}), skip")
                  break

              status = gh_post(f"/repos/{REPO}/actions/workflows/daily.yml/dispatches", {"ref": "main"})
              if status == 204:
                  tg_post("sendMessage", {
                      "chat_id": CHAT_ID,
                      "text": "🚀 Run lancé ! Tu recevras les articles dans quelques instants."
                  })
                  print("  ✅ Workflow dispatched")
              else:
                  print(f"  ❌ Dispatch failed (status {status})")
              break

          if not found:
              print("No recent 'run' command found")

          PYEOF
